services:
  - type: web
    name: rationmitra-server
    env: node
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    rootDir: server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false

