version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: rationmitra-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: rationmitra

  server:
    build: ./server
    container_name: rationmitra-server
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/rationmitra
      - JWT_SECRET=change_me_in_production
      - JWT_REFRESH_SECRET=change_me_refresh_in_production
      - PORT=5000
      - NODE_ENV=development
      - ML_SERVICE_URL=http://ml-service:5001
    volumes:
      - ./server/src:/app/src

  client:
    build: ./client
    container_name: rationmitra-client
    ports:
      - '5173:5173'
    depends_on:
      - server
    environment:
      - VITE_PROXY_TARGET=http://server:5000
    volumes:
      - ./client/src:/app/src

  ml-service:
    build: ./ml-service
    container_name: rationmitra-ml
    ports:
      - '5001:5001'
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/rationmitra
      - PORT=5001

volumes:
  mongo-data:
